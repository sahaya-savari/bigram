<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bigram Language Model — Next Word Predictor</title>
    <meta name="description"
        content="Predict the next word using a Bigram Language Model. Type a word and see AI predictions with confidence scores.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a1a;
            --bg-card: rgba(255, 255, 255, 0.04);
            --bg-card-hover: rgba(255, 255, 255, 0.07);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(99, 102, 241, 0.4);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-1: #818cf8;
            --accent-2: #6366f1;
            --accent-3: #4f46e5;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #d946ef 100%);
            --gradient-3: linear-gradient(135deg, #0ea5e9 0%, #6366f1 50%, #a855f7 100%);
            --shadow-glow: 0 0 60px rgba(99, 102, 241, 0.15);
            --green-accent: #10b981;
            --green-glow: rgba(16, 185, 129, 0.15);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(14, 165, 233, 0.05) 0%, transparent 50%);
            animation: bgShift 20s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes bgShift {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }

            33% {
                transform: translate(2%, -2%) rotate(1deg);
            }

            66% {
                transform: translate(-1%, 1%) rotate(-1deg);
            }
        }

        /* Header */
        header {
            width: 100%;
            padding: 2rem 2rem 0;
            text-align: center;
            margin-top: 2.5rem;
        }

        .logo-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--accent-1);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(12px);
        }

        .logo-badge .dot {
            width: 6px;
            height: 6px;
            background: var(--accent-2);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4);
            }

            50% {
                opacity: 0.7;
                box-shadow: 0 0 0 6px rgba(99, 102, 241, 0);
            }
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: var(--gradient-2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
            margin-bottom: 0.75rem;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.05rem;
            font-weight: 400;
            max-width: 540px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Main content */
        main {
            width: 100%;
            max-width: 680px;
            padding: 2rem 1.5rem;
        }

        /* Corpus Toggle */
        .corpus-section {
            margin-bottom: 1.25rem;
        }

        .corpus-toggle {
            display: flex;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 1rem;
            backdrop-filter: blur(20px);
        }

        .toggle-btn {
            flex: 1;
            padding: 0.65rem 1rem;
            background: transparent;
            border: none;
            border-radius: 11px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .toggle-btn.active {
            background: rgba(99, 102, 241, 0.15);
            color: var(--accent-1);
            box-shadow: 0 2px 12px rgba(99, 102, 241, 0.1);
        }

        .toggle-btn:hover:not(.active) {
            color: var(--text-secondary);
        }

        /* Custom corpus panel */
        .custom-corpus-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s ease;
            opacity: 0;
        }

        .custom-corpus-panel.open {
            max-height: 400px;
            opacity: 1;
        }

        .corpus-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 1.25rem;
            backdrop-filter: blur(20px);
            margin-bottom: 1rem;
        }

        .corpus-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .corpus-card-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.85rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--green-accent);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .upload-btn:hover {
            background: rgba(16, 185, 129, 0.18);
            border-color: rgba(16, 185, 129, 0.35);
        }

        .corpus-textarea {
            width: 100%;
            min-height: 120px;
            max-height: 200px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 0.9rem 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            line-height: 1.6;
            color: var(--text-primary);
            resize: vertical;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .corpus-textarea::placeholder {
            color: var(--text-muted);
        }

        .corpus-textarea:focus {
            border-color: var(--accent-2);
        }

        .file-info {
            display: none;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.6rem;
            padding: 0.5rem 0.75rem;
            background: rgba(16, 185, 129, 0.08);
            border-radius: 8px;
            font-size: 0.8rem;
            color: var(--green-accent);
        }

        .file-info.visible {
            display: flex;
        }

        .file-info .file-name {
            flex: 1;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-info .clear-file {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 0 0.25rem;
            transition: color 0.2s;
        }

        .file-info .clear-file:hover {
            color: #f87171;
        }

        .corpus-status {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .corpus-status .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green-accent);
        }

        .corpus-status.custom .status-dot {
            background: var(--accent-1);
        }

        /* Input card */
        .input-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 1.75rem;
            backdrop-filter: blur(20px);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .input-card:focus-within {
            border-color: var(--border-glow);
            box-shadow: var(--shadow-glow);
        }

        .input-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.75rem;
        }

        .input-wrapper {
            display: flex;
            gap: 0.75rem;
        }

        .input-wrapper input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.9rem 1.2rem;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s ease, background 0.2s ease;
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        .input-wrapper input:focus {
            border-color: var(--accent-2);
            background: rgba(255, 255, 255, 0.07);
        }

        .predict-btn {
            padding: 0.9rem 1.8rem;
            background: var(--gradient-1);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s;
            white-space: nowrap;
        }

        .predict-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.35);
        }

        .predict-btn:active {
            transform: translateY(0);
        }

        .predict-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Result area */
        .result-area {
            margin-top: 1.5rem;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .result-area.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .prediction-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 2rem;
            backdrop-filter: blur(20px);
            text-align: center;
        }

        .prediction-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.75rem;
        }

        .prediction-word {
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--gradient-3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .confidence-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.35rem 0.85rem;
            background: rgba(99, 102, 241, 0.12);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent-1);
            margin-bottom: 1.5rem;
        }

        .source-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.25rem 0.65rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--green-accent);
            margin-left: 0.5rem;
        }

        .no-prediction {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 500;
            padding: 1rem 0;
        }

        /* Candidates */
        .candidates-section {
            border-top: 1px solid var(--border-subtle);
            padding-top: 1.25rem;
            text-align: left;
        }

        .candidates-title {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .candidate-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.6rem;
            animation: fadeInUp 0.4s ease backwards;
        }

        .candidate-row:nth-child(2) {
            animation-delay: 0.05s;
        }

        .candidate-row:nth-child(3) {
            animation-delay: 0.1s;
        }

        .candidate-row:nth-child(4) {
            animation-delay: 0.15s;
        }

        .candidate-row:nth-child(5) {
            animation-delay: 0.2s;
        }

        .candidate-word {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            min-width: 80px;
        }

        .candidate-bar-track {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            overflow: hidden;
        }

        .candidate-bar-fill {
            height: 100%;
            border-radius: 100px;
            background: var(--gradient-3);
            transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .candidate-pct {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            min-width: 45px;
            text-align: right;
        }

        /* Error state */
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            color: #fca5a5;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Footer */
        footer {
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: auto;
        }

        footer a {
            color: var(--accent-1);
            text-decoration: none;
            transition: color 0.2s;
        }

        footer a:hover {
            color: var(--accent-2);
        }

        /* Hidden file input */
        #fileInput {
            display: none;
        }

        /* Responsive */
        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }

            .input-wrapper {
                flex-direction: column;
            }

            .prediction-word {
                font-size: 2rem;
            }

            main {
                padding: 1.5rem 1rem;
            }

            header {
                margin-top: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo-badge">
            <span class="dot"></span>
            Bigram Language Model
        </div>
        <h1>Next Word Predictor</h1>
        <p class="subtitle">Type a word and the bigram model will predict what comes next. Use the default corpus or
            provide your own text.</p>
    </header>

    <main>
        <!-- Corpus Toggle -->
        <div class="corpus-section">
            <div class="corpus-toggle">
                <button class="toggle-btn active" id="defaultToggle" onclick="setCorpusMode('default')">
                    📄 Default Corpus
                </button>
                <button class="toggle-btn" id="customToggle" onclick="setCorpusMode('custom')">
                    ✏️ Custom Corpus
                </button>
            </div>

            <div class="custom-corpus-panel" id="customPanel">
                <div class="corpus-card">
                    <div class="corpus-card-header">
                        <span class="corpus-card-label">Paste your text or upload a file</span>
                        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                            📁 Upload .txt
                        </button>
                        <input type="file" id="fileInput" accept=".txt,.text" onchange="handleFileUpload(event)">
                    </div>
                    <textarea class="corpus-textarea" id="corpusTextarea"
                        placeholder="Paste your paragraph or corpus text here... The model will learn bigram patterns from this text to make predictions."></textarea>
                    <div class="file-info" id="fileInfo">
                        <span>📎</span>
                        <span class="file-name" id="fileName"></span>
                        <button class="clear-file" onclick="clearFile()">✕</button>
                    </div>
                </div>
            </div>

            <div class="corpus-status" id="corpusStatus">
                <span class="status-dot"></span>
                <span id="statusText">Using default corpus (corpus.txt)</span>
            </div>
        </div>

        <!-- Prediction Input -->
        <div class="input-card">
            <label class="input-label" for="wordInput">Enter a word</label>
            <div class="input-wrapper">
                <input type="text" id="wordInput" placeholder="e.g. tiger, the, is..." autocomplete="off"
                    spellcheck="false">
                <button class="predict-btn" id="predictBtn" onclick="predict()">Predict</button>
            </div>
        </div>

        <div class="result-area" id="resultArea"></div>
    </main>

    <footer>
        Built with <a href="https://fastapi.tiangolo.com" target="_blank">FastAPI</a> &middot;
        <a href="/docs" target="_blank">API Docs</a>
    </footer>

    <script>
        const input = document.getElementById('wordInput');
        const btn = document.getElementById('predictBtn');
        const resultArea = document.getElementById('resultArea');
        const corpusTextarea = document.getElementById('corpusTextarea');
        const fileInput = document.getElementById('fileInput');
        const fileInfoEl = document.getElementById('fileInfo');
        const fileNameEl = document.getElementById('fileName');
        const statusText = document.getElementById('statusText');
        const corpusStatus = document.getElementById('corpusStatus');

        let corpusMode = 'default'; // 'default' or 'custom'
        let uploadedFile = null;

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') predict();
        });

        function setCorpusMode(mode) {
            corpusMode = mode;
            document.getElementById('defaultToggle').classList.toggle('active', mode === 'default');
            document.getElementById('customToggle').classList.toggle('active', mode === 'custom');
            document.getElementById('customPanel').classList.toggle('open', mode === 'custom');

            if (mode === 'default') {
                statusText.textContent = 'Using default corpus (corpus.txt)';
                corpusStatus.classList.remove('custom');
            } else {
                updateCustomStatus();
                corpusStatus.classList.add('custom');
            }
        }

        function updateCustomStatus() {
            if (uploadedFile) {
                statusText.textContent = `Using uploaded file: ${uploadedFile.name}`;
            } else if (corpusTextarea.value.trim()) {
                const wordCount = corpusTextarea.value.trim().split(/\s+/).length;
                statusText.textContent = `Using custom text (${wordCount} words)`;
            } else {
                statusText.textContent = 'Paste text or upload a file above';
            }
        }

        corpusTextarea.addEventListener('input', () => {
            if (corpusMode === 'custom') updateCustomStatus();
        });

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (file) {
                uploadedFile = file;
                fileNameEl.textContent = file.name;
                fileInfoEl.classList.add('visible');
                corpusTextarea.placeholder = 'File loaded! You can also add more text here...';
                updateCustomStatus();
            }
        }

        function clearFile() {
            uploadedFile = null;
            fileInput.value = '';
            fileInfoEl.classList.remove('visible');
            corpusTextarea.placeholder = 'Paste your paragraph or corpus text here...';
            updateCustomStatus();
        }

        async function predict() {
            const word = input.value.trim();
            if (!word) {
                input.focus();
                return;
            }

            btn.disabled = true;
            btn.textContent = '...';

            try {
                let data;

                if (corpusMode === 'custom' && (corpusTextarea.value.trim() || uploadedFile)) {
                    // Use custom corpus endpoint
                    const formData = new FormData();
                    formData.append('word', word);

                    if (uploadedFile) {
                        formData.append('corpus_file', uploadedFile);
                    }
                    if (corpusTextarea.value.trim()) {
                        formData.append('corpus_text', corpusTextarea.value.trim());
                    }

                    const res = await fetch('/predict-custom', { method: 'POST', body: formData });
                    data = await res.json();
                } else {
                    // Use default corpus
                    const res = await fetch(`/predict?word=${encodeURIComponent(word)}`);
                    data = await res.json();
                }

                resultArea.classList.remove('visible');

                setTimeout(() => {
                    const isCustom = data.corpus_source === 'custom';

                    if (data.prediction === null) {
                        resultArea.innerHTML = `
                            <div class="prediction-card">
                                <p class="no-prediction">No prediction available for "<strong>${escapeHtml(data.input)}</strong>"</p>
                                <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 0.5rem;">
                                    ${isCustom
                                ? 'Try a word that appears in your custom text.'
                                : 'Try words from the corpus: tiger, the, is, a, in...'}
                                </p>
                            </div>
                        `;
                    } else {
                        const candidates = data.all_candidates || {};
                        const maxProb = Math.max(...Object.values(candidates), 0.01);

                        let candidatesHTML = '';
                        for (const [w, prob] of Object.entries(candidates)) {
                            const pct = (prob * 100).toFixed(1);
                            const barWidth = (prob / maxProb * 100).toFixed(1);
                            candidatesHTML += `
                                <div class="candidate-row">
                                    <span class="candidate-word">${escapeHtml(w)}</span>
                                    <div class="candidate-bar-track">
                                        <div class="candidate-bar-fill" style="width: 0%;" data-width="${barWidth}%"></div>
                                    </div>
                                    <span class="candidate-pct">${pct}%</span>
                                </div>
                            `;
                        }

                        resultArea.innerHTML = `
                            <div class="prediction-card">
                                <p class="prediction-label">Predicted next word</p>
                                <p class="prediction-word">${escapeHtml(data.prediction)}</p>
                                <span class="confidence-badge">
                                    ⚡ ${(data.confidence * 100).toFixed(1)}% confidence
                                </span>
                                ${isCustom ? '<span class="source-badge">✏️ Custom corpus</span>' : ''}
                                ${Object.keys(candidates).length > 0 ? `
                                    <div class="candidates-section">
                                        <p class="candidates-title">All candidates</p>
                                        ${candidatesHTML}
                                    </div>
                                ` : ''}
                            </div>
                        `;

                        // Animate bars
                        requestAnimationFrame(() => {
                            document.querySelectorAll('.candidate-bar-fill').forEach(bar => {
                                bar.style.width = bar.dataset.width;
                            });
                        });
                    }

                    resultArea.classList.add('visible');
                }, 100);

            } catch (err) {
                resultArea.innerHTML = `<div class="error-msg">Something went wrong. Is the server running?</div>`;
                resultArea.classList.add('visible');
            }

            btn.disabled = false;
            btn.textContent = 'Predict';
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Focus input on load
        input.focus();
    </script>
</body>

</html>
