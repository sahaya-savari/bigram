<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's Next?</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-color: #0a1f12;
            --bg-secondary: #112a1a;
            --accent-color: #5fa87a;
            --accent-glow: rgba(95, 168, 122, 0.25);
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-white: #e0ebe4;
            --font-main: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(160deg, var(--bg-color) 0%, var(--bg-secondary) 50%, #0d2918 100%);
            color: var(--text-white);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 3rem 1rem;
            overflow-x: hidden;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 800;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .pill-container {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .pill-btn {
            background: var(--glass-bg);
            color: var(--text-white);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            padding: 0.6rem 2rem;
            font-size: 2.2rem;
            font-weight: 600;
            font-family: var(--font-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s, background 0.2s;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .pill-btn:hover {
            transform: scale(1.05) translateY(-2px);
            background: rgba(95, 168, 122, 0.15);
            box-shadow: 0 6px 25px var(--accent-glow);
            border-color: var(--accent-color);
        }

        .pill-btn:active {
            transform: scale(0.98);
        }

        .custom-input-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
            width: 100%;
            max-width: 500px;
        }

        .custom-input {
            flex: 1;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            padding: 0.8rem 1.5rem;
            font-size: 1.2rem;
            color: var(--text-white);
            font-family: var(--font-main);
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .custom-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .custom-input:focus {
            border-color: var(--accent-color);
            background: rgba(95, 168, 122, 0.1);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .custom-btn {
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            border-radius: 100px;
            padding: 0 1.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
        }

        .custom-btn:hover {
            background: #7ec49a;
            transform: scale(1.05);
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        /* Result Area */
        .result-phrase {
            font-size: 3.5rem;
            font-weight: 500;
            margin-bottom: 2rem;
            text-align: center;
            min-height: 4.5rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .result-phrase.visible {
            opacity: 1;
        }

        .separator {
            width: 100%;
            max-width: 900px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-border), var(--accent-color), var(--glass-border), transparent);
            border: none;
            margin-bottom: 2.5rem;
            border-radius: 2px;
        }

        .slogan {
            font-size: 5.5rem;
            font-weight: 800;
            color: var(--accent-color);
            text-align: center;
            line-height: 1.1;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: -1px;
            opacity: 0.85;
        }

        .error {
            color: #ffb3b3;
            font-size: 1.5rem;
            margin-top: 1rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 3rem;
            }

            .pill-btn {
                font-size: 1.5rem;
                padding: 0.5rem 1.5rem;
            }

            .result-phrase {
                font-size: 2.5rem;
            }

            .slogan {
                font-size: 3.5rem;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2.5rem;
            }

            .pill-container {
                gap: 1rem;
            }

            .pill-btn {
                font-size: 1.2rem;
            }

            .custom-input-container {
                flex-direction: column;
            }

            .custom-btn {
                padding: 0.8rem;
            }
        }
    </style>
</head>

<body>

    <h1>WHAT'S NEXT?</h1>

    <div class="pill-container">
        <button class="pill-btn" onclick="setInputAndPredict('Tyrannosaurus')">🦖 T-Rex</button>
        <button class="pill-btn" onclick="setInputAndPredict('Triceratops')">🦕 Triceratops</button>
        <button class="pill-btn" onclick="setInputAndPredict('Velociraptor')">🦎 Velociraptor</button>
    </div>

    <div class="custom-input-container">
        <input type="text" id="wordInput" class="custom-input" placeholder="Or type a context word..."
            autocomplete="off">
        <button class="custom-btn" onclick="predict()">Go</button>
    </div>
    <p style="font-size: 0.95rem; opacity: 0.45; margin-top: -1.5rem; margin-bottom: 2rem; text-align: center;">
        Try: <em>dinosaurs, lion, elephant, wolf, shark, eagle, spinosaurus, stegosaurus</em>
    </p>

    <!-- This matches the image's text area: 'Tiger belongs to' -->
    <div class="result-phrase" id="resultPhrase"></div>

    <hr class="separator" />

    <div class="slogan">Bigram Language Model</div>

    <script>
        const inputEl = document.getElementById('wordInput');
        const resultPhrase = document.getElementById('resultPhrase');

        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') predict();
        });

        async function setInputAndPredict(word) {
            inputEl.value = word;
            await predict();
        }

        async function predict() {
            const word = inputEl.value.trim();
            if (!word) return;

            // Hide previous
            resultPhrase.classList.remove('visible');
            resultPhrase.classList.remove('error');

            try {
                const res = await fetch(`/generate?word=${encodeURIComponent(word)}`);
                const data = await res.json();

                setTimeout(() => {
                    if (data.sentence === null) {
                        resultPhrase.textContent = `${word} ...?`;
                    } else {
                        resultPhrase.textContent = data.sentence;
                    }
                    resultPhrase.classList.add('visible');
                }, 200);

            } catch (err) {
                setTimeout(() => {
                    resultPhrase.textContent = 'Server Error :(';
                    resultPhrase.classList.add('error');
                    resultPhrase.classList.add('visible');
                }, 200);
            }
        }
    </script>

</body>

</html>
