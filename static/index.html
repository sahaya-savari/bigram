<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's Next?</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-color: #004d00;
            --accent-color: #74ED29;
            --text-white: #ffffff;
            --font-main: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 3rem 1rem;
            overflow-x: hidden;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 800;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .pill-container {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .pill-btn {
            background-color: var(--accent-color);
            color: var(--bg-color);
            border: none;
            border-radius: 100px;
            padding: 0.6rem 2rem;
            font-size: 2.2rem;
            font-weight: 600;
            font-family: var(--font-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .pill-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 6px 20px rgba(116, 237, 41, 0.3);
        }

        .pill-btn:active {
            transform: scale(0.98);
        }

        .custom-input-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
            width: 100%;
            max-width: 500px;
        }

        .custom-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 100px;
            padding: 0.8rem 1.5rem;
            font-size: 1.2rem;
            color: #fff;
            font-family: var(--font-main);
            outline: none;
            transition: border-color 0.2s;
        }

        .custom-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .custom-input:focus {
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.15);
        }

        .custom-btn {
            background-color: #ffffff;
            color: var(--bg-color);
            border: none;
            border-radius: 100px;
            padding: 0 1.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        .custom-btn:hover {
            background-color: #f0f0f0;
            transform: scale(1.05);
        }

        /* Result Area */
        .result-phrase {
            font-size: 3.5rem;
            font-weight: 500;
            margin-bottom: 2rem;
            text-align: center;
            min-height: 4.5rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .result-phrase.visible {
            opacity: 1;
        }

        .separator {
            width: 100%;
            max-width: 900px;
            height: 3px;
            background-color: var(--text-white);
            border: none;
            margin-bottom: 2.5rem;
            border-radius: 2px;
        }

        .slogan {
            font-size: 5.5rem;
            font-weight: 800;
            color: var(--accent-color);
            text-align: center;
            line-height: 1.1;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: -1px;
        }

        .error {
            color: #ffb3b3;
            font-size: 1.5rem;
            margin-top: 1rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 3rem;
            }

            .pill-btn {
                font-size: 1.5rem;
                padding: 0.5rem 1.5rem;
            }

            .result-phrase {
                font-size: 2.5rem;
            }

            .slogan {
                font-size: 3.5rem;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2.5rem;
            }

            .pill-container {
                gap: 1rem;
            }

            .pill-btn {
                font-size: 1.2rem;
            }

            .custom-input-container {
                flex-direction: column;
            }

            .custom-btn {
                padding: 0.8rem;
            }
        }
    </style>
</head>

<body>

    <h1>WHAT'S NEXT?</h1>

    <div class="pill-container">
        <button class="pill-btn" onclick="setInputAndPredict('Tiger')">🐯 Tiger</button>
        <button class="pill-btn" onclick="setInputAndPredict('Eagle')">🦅 Eagle</button>
        <button class="pill-btn" onclick="setInputAndPredict('Santo')">🧑 Santo</button>
    </div>

    <div class="custom-input-container">
        <input type="text" id="wordInput" class="custom-input" placeholder="Or type a context word..."
            autocomplete="off">
        <button class="custom-btn" onclick="predict()">Go</button>
    </div>

    <!-- This matches the image's text area: 'Tiger belongs to' -->
    <div class="result-phrase" id="resultPhrase"></div>

    <hr class="separator" />

    <div class="slogan">P(A/B) is all you need!</div>

    <script>
        const inputEl = document.getElementById('wordInput');
        const resultPhrase = document.getElementById('resultPhrase');

        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') predict();
        });

        async function setInputAndPredict(word) {
            inputEl.value = word;
            await predict();
        }

        async function predict() {
            const word = inputEl.value.trim();
            if (!word) return;

            // Hide previous
            resultPhrase.classList.remove('visible');

            try {
                const res = await fetch(`/predict?word=${encodeURIComponent(word)}`);
                const data = await res.json();

                setTimeout(() => {
                    if (data.prediction === null) {
                        resultPhrase.textContent = `${word} ...?`;
                    } else {
                        // Display the word and its prediction to match 'Tiger belongs to' style
                        const capWord = word.charAt(0).toUpperCase() + word.slice(1);
                        resultPhrase.textContent = `${capWord} ${data.prediction}`;
                    }
                    resultPhrase.classList.add('visible');
                }, 200);

            } catch (err) {
                setTimeout(() => {
                    resultPhrase.textContent = 'Server Error :(';
                    resultPhrase.classList.add('error');
                    resultPhrase.classList.add('visible');
                }, 200);
            }
        }
    </script>

</body>

</html>
